name: Feature request
description: Suggest a new feature or improvement
title: "[FEATURE] "
labels: ["enhancement"]

body:
  - type: dropdown
    id: phase
    attributes:
      label: Pipeline phase
      description: Which phase of the roadmap does this relate to?
      options:
        - "Phase 1 — Local BLAST+"
        - "Phase 2 — PDF Reports"
        - "Phase 3 — Protected Species"
        - "Phase 4 — Curated Databases"
        - "Phase 5 — Multi-marker"
        - "Phase 6 — Rarefaction"
        - "Phase 7 — Beta Diversity"
        - "Phase 8 — Cloud API"
        - "Phase 9 — ASV/DADA2"
        - "Phase 10 — Nanopore Streaming"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the gap or limitation in the current pipeline.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see implemented?
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How will we know when this is done? List testable outcomes.
      placeholder: |
        - [ ] Pipeline runs with --local flag on a 100-sequence FASTA in < 2 minutes
        - [ ] Database version is stamped in blast_hit_table.csv
